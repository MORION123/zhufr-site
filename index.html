<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>ЖУФР - Система учета строительных работ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #1a1e24;
            --bg-secondary: #252b33;
            --bg-card: #2f3640;
            --text-primary: #e0e0e0;
            --text-secondary: #9aa4b3;
            --accent: #5d6d7e;
            --accent-hover: #4a5a6b;
            --border: #3a424e;
            --success: #3a6b4b;
            --warning: #7a5d3a;
            --danger: #6b3f3f;
            --admin: #8e44ad;
            --storage: #16a085;
            --shift: #2980b9;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            padding: 12px;
            line-height: 1.4;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
            padding: 15px;
            background: var(--bg-secondary);
            border-radius: 10px;
            border: 1px solid var(--border);
        }

        .header h1 {
            font-size: 32px;
            letter-spacing: 2px;
            color: var(--text-primary);
            margin-bottom: 5px;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .system-status {
            background: var(--bg-secondary);
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 20px;
            text-align: center;
            color: var(--text-secondary);
            border: 1px solid var(--border);
            font-size: 14px;
        }

        .auth-card {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
            max-width: 600px;
            margin: 0 auto 20px;
        }

        .auth-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        .auth-tab {
            flex: 1;
            padding: 12px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-secondary);
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .auth-tab.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .auth-form {
            display: none;
        }

        .auth-form.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 15px;
            transition: all 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--accent);
        }

        .btn-primary {
            width: 100%;
            padding: 15px;
            background: var(--accent);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn {
            padding: 10px 16px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-secondary);
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn:hover {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .btn-success {
            background: var(--success);
            color: white;
            border-color: var(--success);
        }

        .btn-success:hover {
            opacity: 0.9;
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 13px;
        }

        .btn-verify {
            background: var(--admin);
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            margin-left: 10px;
            white-space: nowrap;
        }

        .btn-verify:hover {
            opacity: 0.9;
        }

        .error-message {
            color: var(--danger);
            font-size: 14px;
            margin-top: 5px;
            margin-bottom: 10px;
            display: none;
        }

        .success-message {
            color: var(--success);
            font-size: 14px;
            margin-top: 5px;
            margin-bottom: 10px;
            display: none;
        }

        .info-message {
            color: var(--shift);
            font-size: 14px;
            margin-top: 5px;
            margin-bottom: 10px;
            display: none;
        }

        .main-content {
            display: none;
        }

        .main-content.visible {
            display: block;
        }

        .top-menu {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .menu-btn {
            padding: 12px 20px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s;
            flex: 1;
            min-width: 120px;
            font-size: 14px;
        }

        .menu-btn:hover {
            background: var(--accent);
            color: white;
        }

        .menu-btn.active {
            background: var(--accent);
            color: white;
        }

        .section-card {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
        }

        .section-title {
            color: var(--text-primary);
            font-size: 20px;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .summary-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            overflow-y: auto;
            padding: 20px;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            background: var(--bg-secondary);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid var(--border);
        }

        .modal-header h2 {
            color: var(--text-primary);
        }

        .info-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
            padding: 15px;
            background: var(--bg-card);
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .info-item {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .info-label {
            color: var(--text-secondary);
            font-size: 11px;
            text-transform: uppercase;
        }

        .info-value {
            color: var(--text-primary);
            font-weight: 600;
            font-size: 14px;
        }

        .table-container {
            overflow-x: auto;
            margin-bottom: 20px;
            background: var(--bg-card);
            border-radius: 8px;
            border: 1px solid var(--border);
            padding: 10px;
        }

        .work-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
            background: var(--bg-secondary);
        }

        .work-table th {
            background: var(--bg-primary);
            color: var(--text-secondary);
            font-weight: 600;
            padding: 8px 4px;
            text-align: center;
            font-size: 11px;
            border: 1px solid var(--border);
            white-space: nowrap;
        }

        .work-table td {
            padding: 4px;
            border: 1px solid var(--border);
            color: var(--text-primary);
            text-align: center;
            vertical-align: middle;
        }

        .work-table input {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--text-primary);
            text-align: center;
            font-size: 11px;
            padding: 2px;
        }

        .work-table input:focus {
            outline: 1px solid var(--accent);
            background: var(--bg-primary);
        }

        .section-header {
            background: var(--accent) !important;
            color: white !important;
            font-weight: bold;
            text-align: left;
            padding: 8px;
        }

        .section-header td {
            background: var(--accent);
            color: white;
            font-weight: bold;
        }

        .totals-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-top: 20px;
            margin-bottom: 20px;
        }

        .total-block {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 15px;
        }

        .total-title {
            color: var(--text-secondary);
            font-size: 12px;
            margin-bottom: 10px;
            text-transform: uppercase;
            border-bottom: 1px solid var(--border);
            padding-bottom: 5px;
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 13px;
        }

        .total-label {
            color: var(--text-secondary);
        }

        .total-value {
            color: var(--text-primary);
            font-weight: 600;
        }

        .materials-list {
            max-height: 150px;
            overflow-y: auto;
            margin-bottom: 10px;
        }

        .material-item {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            padding: 4px 0;
            border-bottom: 1px solid var(--border);
        }

        .material-name {
            color: var(--text-secondary);
        }

        .material-volume {
            color: var(--storage);
            font-weight: 600;
        }

        .final-total {
            border-top: 1px solid var(--border);
            padding-top: 8px;
            margin-top: 8px;
            font-weight: bold;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }

        .summaries-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .summary-card {
            background: var(--bg-card);
            border-radius: 8px;
            padding: 15px;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.3s;
        }

        .summary-card:hover {
            transform: translateX(5px);
            border-color: var(--accent);
        }

        .summary-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .summary-date {
            color: var(--text-primary);
            font-weight: 600;
        }

        .summary-shift {
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 11px;
            background: var(--shift);
            color: white;
        }

        .summary-master {
            color: var(--text-secondary);
            font-size: 13px;
            margin-bottom: 8px;
        }

        .summary-stats {
            display: flex;
            gap: 15px;
            margin-top: 10px;
            color: var(--text-secondary);
            font-size: 12px;
        }

        .filters-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filter-select {
            padding: 8px 12px;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-primary);
            min-width: 200px;
        }

        .empty-state {
            text-align: center;
            color: var(--text-secondary);
            padding: 40px;
            background: var(--bg-card);
            border-radius: 8px;
            border: 1px dashed var(--border);
        }

        .verify-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .verify-row input {
            flex: 1;
        }

        .timer {
            color: var(--success);
            font-size: 14px;
            text-align: center;
            margin: 10px 0;
        }

        .storage-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .storage-card {
            background: var(--bg-card);
            border-radius: 8px;
            padding: 15px;
            border-left: 4px solid var(--storage);
            cursor: pointer;
            transition: all 0.3s;
        }

        .storage-card:hover {
            transform: translateX(5px);
        }

        .storage-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .storage-material {
            font-weight: 600;
            color: var(--text-primary);
        }

        .storage-piket {
            color: var(--text-secondary);
            font-size: 12px;
        }

        .storage-volume {
            font-size: 16px;
            font-weight: 600;
            color: var(--storage);
        }

        .employees-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .employee-card {
            background: var(--bg-card);
            border-radius: 8px;
            padding: 15px;
            border: 1px solid var(--border);
        }

        .employee-name {
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 5px;
        }

        .employee-position {
            color: var(--text-secondary);
            font-size: 12px;
            padding: 3px 8px;
            background: var(--bg-primary);
            border-radius: 12px;
            display: inline-block;
            margin-bottom: 8px;
        }

        .employee-contacts {
            color: var(--text-secondary);
            font-size: 12px;
        }

        .employee-contacts p {
            margin: 3px 0;
        }

        /* Мобильные стили */
        @media (max-width: 768px) {
            body {
                padding: 8px;
            }

            .auth-card {
                padding: 20px;
                margin: 5px;
            }

            .form-group input,
            .form-group select {
                font-size: 16px;
                padding: 15px;
            }

            .auth-tabs {
                gap: 5px;
            }

            .auth-tab {
                padding: 12px 5px;
                font-size: 14px;
            }

            .verify-row {
                flex-direction: column;
                gap: 15px;
            }

            .verify-row input {
                width: 100%;
                margin-bottom: 5px;
                font-size: 16px;
            }

            .btn-verify {
                width: 100%;
                margin-left: 0;
                padding: 15px;
                font-size: 16px;
            }

            .timer {
                font-size: 16px;
                margin: 15px 0;
            }

            #verificationBlock {
                display: none;
                margin-top: 20px;
                padding: 20px;
                background: var(--bg-card);
                border-radius: 12px;
                border: 3px solid var(--accent);
                animation: fadeIn 0.3s ease;
            }

            @keyframes fadeIn {
                from { opacity: 0; transform: translateY(-10px); }
                to { opacity: 1; transform: translateY(0); }
            }

            .btn-primary {
                padding: 18px;
                font-size: 18px;
            }

            .btn {
                padding: 14px;
                font-size: 16px;
            }

            .system-status {
                font-size: 12px;
                padding: 8px;
            }
        }

        /* Для очень маленьких экранов */
        @media (max-width: 480px) {
            .header h1 {
                font-size: 28px;
            }

            .header p {
                font-size: 12px;
            }

            .form-group label {
                font-size: 12px;
            }

            .totals-container {
                grid-template-columns: 1fr;
                gap: 10px;
            }
        }

        /* Отладочные стили */
        .debug-highlight {
            border: 3px solid red !important;
            background: #2f3640 !important;
            padding: 20px !important;
            margin: 10px 0 !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>ЖУФР</h1>
            <p>Журнал учета работ · Система управления строительством</p>
        </div>

        <div class="system-status">
            ✅ Отправка кода через Formspree · 50 писем в месяц бесплатно
        </div>

        <div id="authCard" class="auth-card">
            <div class="auth-tabs">
                <button class="auth-tab active" onclick="showAuthTab('login')">Вход</button>
                <button class="auth-tab" onclick="showAuthTab('register')">Регистрация</button>
            </div>

            <div id="loginForm" class="auth-form active">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="loginEmail" placeholder="example@mail.ru">
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" id="loginPassword" placeholder="••••••••">
                </div>
                <div class="error-message" id="loginError"></div>
                <button class="btn-primary" onclick="login()">ВОЙТИ</button>
                <button class="btn" onclick="demoLogin()" style="margin-top: 10px;">🔑 ДЕМО-ВХОД</button>
            </div>

            <div id="registerForm" class="auth-form">
                <!-- ОТЛАДОЧНЫЙ БЛОК (виден всегда) -->
                <div style="background: var(--admin); color: white; padding: 15px; margin-bottom: 20px; border-radius: 8px; text-align: center; font-size: 16px;">
                    📱 РЕЖИМ ОТЛАДКИ
                    <br>
                    <span id="debugCodeDisplay" style="font-size: 24px; font-weight: bold; margin: 10px 0;">------</span>
                    <br>
                    <button onclick="forceShowBlock()" style="background: white; color: black; border: none; padding: 10px 20px; border-radius: 5px; margin-top: 10px; font-weight: bold;">🔧 ПРИНУДИТЕЛЬНО ПОКАЗАТЬ БЛОК</button>
                </div>

                <div class="form-group">
                    <label>ФИО</label>
                    <input type="text" id="regFullName" placeholder="Иванов Иван Иванович">
                </div>
                <div class="form-group">
                    <label>Должность</label>
                    <select id="regPosition">
                        <option value="Дорожный рабочий">Дорожный рабочий</option>
                        <option value="Мастер">Мастер</option>
                        <option value="Прораб">Прораб</option>
                        <option value="Старший прораб">Старший прораб</option>
                        <option value="Начальник участка">Начальник участка</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Номер участка</label>
                    <select id="regSection">
                        <option value="29">Участок 29</option>
                        <option value="51">Участок 51</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Телефон</label>
                    <input type="tel" id="regPhone" placeholder="+7 (999) 123-45-67">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="regEmail" placeholder="example@mail.ru">
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" id="regPassword" placeholder="••••••••">
                </div>
                <div class="form-group">
                    <label>Подтверждение пароля</label>
                    <input type="password" id="regConfirmPassword" placeholder="••••••••">
                </div>
                
                <!-- Блок для ввода кода подтверждения -->
                <div class="form-group" id="verificationBlock" style="display: none; border: 3px solid var(--accent); padding: 20px; border-radius: 10px; background: var(--bg-card);">
                    <label style="font-size: 18px; color: var(--accent);">🔐 Код подтверждения</label>
                    <div class="verify-row">
                        <input type="text" id="verificationCode" placeholder="Введите 6-значный код из письма" style="font-size: 18px; padding: 15px;">
                        <button class="btn-verify" onclick="verifyCode()" style="font-size: 18px; padding: 15px;">Проверить</button>
                    </div>
                    <div class="timer" id="timer" style="font-size: 16px;"></div>
                    <button class="btn" onclick="sendVerificationCode()" id="resendBtn" style="width:100%; margin-top:10px; padding: 15px; font-size: 16px;">Отправить код повторно</button>
                </div>

                <div class="error-message" id="registerError"></div>
                <div class="success-message" id="registerSuccess"></div>
                <div class="info-message" id="registerInfo"></div>
                
                <button class="btn-primary" onclick="startRegistration()" id="registerBtn" style="font-size: 18px; padding: 18px;">ЗАРЕГИСТРИРОВАТЬСЯ</button>
            </div>
        </div>

        <!-- Остальное содержимое (сводки, склады и т.д.) -->
        <div id="mainContent" class="main-content">
            <!-- ... (весь остальной код из предыдущей версии) ... -->
        </div>
    </div>

    <script>
        // ========== СПИСОК МАТЕРИАЛОВ ==========
        const MATERIALS = [
            'ЩПС 0-80',
            'Щебень 20-40',
            'Щебень 40-70',
            'Щебень 5-20',
            'Бутовый камень',
            'ПГС',
            'Песок',
            'Грунт',
            'ПРС (плодородный слой)'
        ];

        // ========== СИСТЕМА АВТОРИЗАЦИИ ==========
        let users = {};
        let currentUser = null;
        let pendingRegistration = null;
        let verificationCode = null;
        let timerInterval = null;

        // Данные системы
        let summaries = JSON.parse(localStorage.getItem('summaries')) || [];
        let storage = JSON.parse(localStorage.getItem('storage')) || {};
        let storageHistory = JSON.parse(localStorage.getItem('storageHistory')) || [];
        let employees = [];

        // Данные для новой сводки
        let workRows = [];
        let incomeMaterials = [];
        let outcomeMaterials = [];
        let currentMaterialType = 'income';

        // ========== ФУНКЦИИ АВТОРИЗАЦИИ ==========

        function showAuthTab(tab) {
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
            
            document.querySelector(`.auth-tab[onclick="showAuthTab('${tab}')"]`).classList.add('active');
            document.getElementById(`${tab}Form`).classList.add('active');
            
            document.getElementById('loginError').style.display = 'none';
            document.getElementById('registerError').style.display = 'none';
            document.getElementById('registerSuccess').style.display = 'none';
            document.getElementById('registerInfo').style.display = 'none';
        }

        function startRegistration() {
            const fullName = document.getElementById('regFullName').value.trim();
            const position = document.getElementById('regPosition').value;
            const section = document.getElementById('regSection').value;
            const phone = document.getElementById('regPhone').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('regConfirmPassword').value;

            if (!fullName || !phone || !email || !password || !confirmPassword) {
                showError('registerError', 'Заполните все поля');
                return;
            }

            if (password !== confirmPassword) {
                showError('registerError', 'Пароли не совпадают');
                return;
            }

            if (password.length < 6) {
                showError('registerError', 'Пароль должен быть не менее 6 символов');
                return;
            }

            if (users[email]) {
                showError('registerError', 'Пользователь с таким email уже зарегистрирован');
                return;
            }

            pendingRegistration = {
                fullName, position, section, phone, email, password
            };

            sendVerificationCode();
        }

        // ========== ИСПРАВЛЕННАЯ ФУНКЦИЯ ДЛЯ МОБИЛЬНЫХ ==========
        function sendVerificationCode() {
            verificationCode = Math.floor(100000 + Math.random() * 900000).toString();
            
            // Показываем код в отладочном блоке
            document.getElementById('debugCodeDisplay').textContent = verificationCode;
            
            showInfo('registerInfo', `Отправляем код на ${pendingRegistration.email}...`);

            const formspreeEndpoint = 'https://formspree.io/f/xlgpowrl';
            
            fetch(formspreeEndpoint, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Accept': 'application/json'
                },
                body: JSON.stringify({
                    email: pendingRegistration.email,
                    code: verificationCode,
                    name: pendingRegistration.fullName,
                    _subject: 'Код подтверждения ЖУФР'
                })
            })
            .then(response => {
                if (response.ok) {
                    console.log('Письмо отправлено успешно');
                    
                    // ПРИНУДИТЕЛЬНО ПОКАЗЫВАЕМ БЛОК
                    forceShowBlock();
                    
                    showSuccess('registerInfo', '✅ Код отправлен! Проверьте почту и папку "Спам".');
                    
                    startTimer(300);
                } else {
                    throw new Error('Ошибка отправки');
                }
            })
            .catch(error => {
                console.error('Ошибка:', error);
                showError('registerError', '❌ Ошибка отправки кода. Попробуйте еще раз.');
            });
        }

        // Функция принудительного показа блока
        function forceShowBlock() {
            const verificationBlock = document.getElementById('verificationBlock');
            const registerBtn = document.getElementById('registerBtn');
            
            if (verificationBlock) {
                // Несколько способов показать блок
                verificationBlock.style.display = 'block';
                verificationBlock.style.visibility = 'visible';
                verificationBlock.style.opacity = '1';
                verificationBlock.style.height = 'auto';
                verificationBlock.style.overflow = 'visible';
                
                // Добавляем класс для подсветки
                verificationBlock.classList.add('debug-highlight');
                
                console.log('Блок принудительно показан');
                
                // Прокручиваем к блоку
                setTimeout(() => {
                    verificationBlock.scrollIntoView({ 
                        behavior: 'smooth', 
                        block: 'center'
                    });
                }, 300);
                
                // Ставим фокус на поле ввода
                setTimeout(() => {
                    document.getElementById('verificationCode').focus();
                }, 500);
            } else {
                console.error('Блок не найден!');
            }
            
            registerBtn.style.display = 'none';
        }

        function startTimer(seconds) {
            const timerDisplay = document.getElementById('timer');
            const resendBtn = document.getElementById('resendBtn');
            
            resendBtn.disabled = true;
            
            if (timerInterval) clearInterval(timerInterval);
            
            timerInterval = setInterval(() => {
                const minutes = Math.floor(seconds / 60);
                const remainingSeconds = seconds % 60;
                timerDisplay.textContent = `Код действителен: ${minutes}:${remainingSeconds.toString().padStart(2, '0')}`;
                
                if (seconds <= 0) {
                    clearInterval(timerInterval);
                    timerDisplay.textContent = '⏰ Время истекло. Запросите код заново.';
                    resendBtn.disabled = false;
                    verificationCode = null;
                }
                seconds--;
            }, 1000);
        }

        function verifyCode() {
            const enteredCode = document.getElementById('verificationCode').value.trim();
            
            if (!enteredCode) {
                showError('registerError', 'Введите код подтверждения');
                return;
            }
            
            if (!verificationCode) {
                showError('registerError', 'Код подтверждения истек. Запросите новый.');
                return;
            }

            if (enteredCode === verificationCode) {
                completeRegistration();
            } else {
                showError('registerError', '❌ Неверный код подтверждения');
            }
        }

        function completeRegistration() {
            users[pendingRegistration.email] = {
                email: pendingRegistration.email,
                fullName: pendingRegistration.fullName,
                position: pendingRegistration.position,
                section: pendingRegistration.section,
                phone: pendingRegistration.phone,
                password: pendingRegistration.password,
                registeredAt: new Date().toISOString()
            };
            
            showSuccess('registerSuccess', '✅ Регистрация успешна! Сейчас вы будете перенаправлены на вход.');
            
            if (timerInterval) clearInterval(timerInterval);
            
            document.getElementById('verificationBlock').style.display = 'none';
            document.getElementById('registerBtn').style.display = 'block';
            
            document.getElementById('regFullName').value = '';
            document.getElementById('regPhone').value = '';
            document.getElementById('regEmail').value = '';
            document.getElementById('regPassword').value = '';
            document.getElementById('regConfirmPassword').value = '';
            document.getElementById('verificationCode').value = '';
            
            pendingRegistration = null;
            verificationCode = null;
            
            setTimeout(() => {
                showAuthTab('login');
                showSuccess('loginError', '✨ Теперь вы можете войти с вашим email и паролем');
            }, 2000);
        }

        function login() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;

            if (!email || !password) {
                showError('loginError', 'Введите email и пароль');
                return;
            }

            const user = users[email];
            
            if (!user) {
                showError('loginError', '❌ Пользователь не найден. Зарегистрируйтесь сначала.');
                return;
            }
            
            if (user.password !== password) {
                showError('loginError', '❌ Неверный пароль');
                return;
            }

            currentUser = user;
            
            document.getElementById('authCard').style.display = 'none';
            document.getElementById('mainContent').classList.add('visible');
            
            updateAllSections();
        }

        // ========== ФУНКЦИИ МЕНЮ (сокращенно) ==========

        function showMenu(menu) {
            document.querySelectorAll('.menu-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.section-card').forEach(section => section.style.display = 'none');
            
            document.querySelector(`.menu-btn[onclick="showMenu('${menu}')"]`).classList.add('active');
            document.getElementById(`${menu}Section`).style.display = 'block';
            
            if (menu === 'summary') renderSummaries();
            else if (menu === 'storage') renderStorage();
            else if (menu === 'employees') renderEmployees();
            else if (menu === 'reports') renderReports();
        }

        function updateAllSections() {
            renderSummaries();
            renderStorage();
            renderEmployees();
            renderReports();
        }

        // ========== ФУНКЦИИ ДЛЯ СВОДОК ==========

        function openSummaryModal() {
            workRows = [];
            incomeMaterials = [];
            outcomeMaterials = [];
            
            for (let i = 1; i <= 4; i++) {
                for (let j = 1; j <= 6; j++) {
                    workRows.push({
                        id: `row_${i}_${j}_${Date.now()}`,
                        section: `Участок ${i}`,
                        workName: '',
                        workUnit: 'м³',
                        workVolume: '',
                        equipmentType: '',
                        equipmentCount: '',
                        equipmentNumber: '',
                        machineHours: '',
                        peopleCount: '',
                        peopleHours: '',
                        note: ''
                    });
                }
            }
            
            document.getElementById('currentMaster').textContent = currentUser?.fullName || 'Мастер';
            document.getElementById('currentSection').textContent = `Участок ${currentUser?.section || '29'}`;
            
            renderWorkTable();
            document.getElementById('summaryModal').style.display = 'block';
        }

        function closeSummaryModal() {
            document.getElementById('summaryModal').style.display = 'none';
        }

        function renderWorkTable() {
            const tbody = document.getElementById('workBody');
            tbody.innerHTML = '';
            
            let currentSection = '';
            let rowNumber = 1;
            
            workRows.forEach((row) => {
                if (row.section !== currentSection) {
                    currentSection = row.section;
                    const headerRow = tbody.insertRow();
                    headerRow.className = 'section-header';
                    headerRow.innerHTML = `<td colspan="13" style="text-align: left; background: var(--accent); color: white; font-weight: bold;">📍 ${row.section}</td>`;
                }
                
                const tr = tbody.insertRow();
                tr.innerHTML = `
                    <td>${rowNumber++}</td>
                    <td>${row.section}</td>
                    <td><input type="text" value="${row.workName || ''}" placeholder="Наименование работ" onchange="updateWorkRow('${row.id}', 'workName', this.value)"></td>
                    <td><input type="text" value="${row.workUnit}" style="width:60px;" onchange="updateWorkRow('${row.id}', 'workUnit', this.value)"></td>
                    <td><input type="text" value="${row.workVolume || ''}" style="width:70px;" onchange="updateWorkRow('${row.id}', 'workVolume', this.value)"></td>
                    <td><input type="text" value="${row.equipmentType || ''}" placeholder="Тип техники" onchange="updateWorkRow('${row.id}', 'equipmentType', this.value)"></td>
                    <td><input type="text" value="${row.equipmentCount || ''}" style="width:50px;" onchange="updateWorkRow('${row.id}', 'equipmentCount', this.value)"></td>
                    <td><input type="text" value="${row.equipmentNumber || ''}" placeholder="А123ВС" style="width:80px;" onchange="updateWorkRow('${row.id}', 'equipmentNumber', this.value)"></td>
                    <td><input type="text" value="${row.machineHours || ''}" style="width:60px;" onchange="updateWorkRow('${row.id}', 'machineHours', this.value)"></td>
                    <td><input type="text" value="${row.peopleCount || ''}" style="width:50px;" onchange="updateWorkRow('${row.id}', 'peopleCount', this.value)"></td>
                    <td><input type="text" value="${row.peopleHours || ''}" style="width:60px;" onchange="updateWorkRow('${row.id}', 'peopleHours', this.value)"></td>
                    <td><input type="text" value="${row.note || ''}" placeholder="Примечание" onchange="updateWorkRow('${row.id}', 'note', this.value)"></td>
                `;
            });
            
            updateTotals();
        }

        function updateWorkRow(id, field, value) {
            const row = workRows.find(r => r.id == id);
            if (row) {
                row[field] = value;
                updateTotals();
            }
        }

        function updateTotals() {
            let totalPeople = 0, totalPeopleHours = 0, totalEquipment = 0, totalEquipmentHours = 0;
            
            workRows.forEach(row => {
                totalPeople += parseInt(row.peopleCount) || 0;
                totalPeopleHours += parseFloat(row.peopleHours) || 0;
                totalEquipment += parseInt(row.equipmentCount) || 0;
                totalEquipmentHours += parseFloat(row.machineHours) || 0;
            });
            
            document.getElementById('totalPeopleCount').textContent = totalPeople;
            document.getElementById('totalPeopleHours').textContent = totalPeopleHours.toFixed(1);
            document.getElementById('totalEquipmentCount').textContent = totalEquipment;
            document.getElementById('totalEquipmentHours').textContent = totalEquipmentHours.toFixed(1);
            
            updateMaterialsLists();
        }

        function updateMaterialsLists() {
            const incomeList = document.getElementById('incomeMaterialsList');
            incomeList.innerHTML = '';
            let totalIncome = 0;
            
            incomeMaterials.forEach(item => {
                const volume = parseFloat(item.volume) || 0;
                totalIncome += volume;
                incomeList.innerHTML += `<div class="material-item"><span class="material-name">${item.material}</span><span class="material-volume">${volume.toFixed(1)} ${item.unit}</span></div>`;
            });
            document.getElementById('totalIncome').textContent = totalIncome.toFixed(1);
            
            const outcomeList = document.getElementById('outcomeMaterialsList');
            outcomeList.innerHTML = '';
            let totalOutcome = 0;
            
            outcomeMaterials.forEach(item => {
                const volume = parseFloat(item.volume) || 0;
                totalOutcome += volume;
                outcomeList.innerHTML += `<div class="material-item"><span class="material-name">${item.material}</span><span class="material-volume">${volume.toFixed(1)} ${item.unit}</span></div>`;
            });
            document.getElementById('totalOutcome').textContent = totalOutcome.toFixed(1);
        }

        function addIncomeRow() {
            currentMaterialType = 'income';
            openMaterialModal('приход');
        }

        function addOutcomeRow() {
            currentMaterialType = 'outcome';
            openMaterialModal('расход');
        }

        function openMaterialModal(type) {
            document.getElementById('materialModalTitle').textContent = `Добавить ${type}`;
            
            const select = document.getElementById('materialSelect');
            select.innerHTML = '<option value="">Выберите материал</option>';
            MATERIALS.forEach(m => {
                select.innerHTML += `<option value="${m}">${m}</option>`;
            });
            
            if (type === 'приход') {
                document.getElementById('supplierField').style.display = 'block';
                document.getElementById('destinationField').style.display = 'none';
            } else {
                document.getElementById('supplierField').style.display = 'none';
                document.getElementById('destinationField').style.display = 'block';
            }
            
            document.getElementById('materialSelect').value = '';
            document.getElementById('materialUnit').value = 'м³';
            document.getElementById('materialVolume').value = '';
            document.getElementById('materialPiket').value = '';
            document.getElementById('materialSupplier').value = '';
            document.getElementById('materialDestination').value = '';
            
            document.getElementById('materialModal').style.display = 'block';
        }

        function closeMaterialModal() {
            document.getElementById('materialModal').style.display = 'none';
        }

        function saveMaterial() {
            const material = document.getElementById('materialSelect').value;
            const unit = document.getElementById('materialUnit').value;
            const volume = document.getElementById('materialVolume').value;
            const piket = document.getElementById('materialPiket').value;
            
            if (!material || !volume) {
                alert('Заполните обязательные поля');
                return;
            }
            
            const item = { id: Date.now() + Math.random(), material, unit, volume, piket };
            
            if (currentMaterialType === 'income') {
                item.supplier = document.getElementById('materialSupplier').value;
                incomeMaterials.push(item);
            } else {
                item.destination = document.getElementById('materialDestination').value;
                outcomeMaterials.push(item);
            }
            
            closeMaterialModal();
            updateMaterialsLists();
        }

        function saveSummary() {
            if (!currentUser) {
                alert('Ошибка: пользователь не авторизован');
                return;
            }

            const date = document.getElementById('reportDate').value;
            if (!date) {
                alert('Введите дату');
                return;
            }

            const summary = {
                id: Date.now(),
                date: date,
                shift: document.getElementById('reportShift').value,
                master: currentUser.fullName,
                masterEmail: currentUser.email,
                section: currentUser.section,
                workRows: [...workRows],
                incomeMaterials: [...incomeMaterials],
                outcomeMaterials: [...outcomeMaterials],
                totalPeople: document.getElementById('totalPeopleCount').textContent,
                totalPeopleHours: document.getElementById('totalPeopleHours').textContent,
                totalEquipment: document.getElementById('totalEquipmentCount').textContent,
                totalHours: document.getElementById('totalEquipmentHours').textContent,
                totalIncome: document.getElementById('totalIncome').textContent,
                totalOutcome: document.getElementById('totalOutcome').textContent,
                createdAt: new Date().toISOString()
            };

            summaries.unshift(summary);
            localStorage.setItem('summaries', JSON.stringify(summaries));
            updateStorage(summary);

            alert('Сводка успешно сохранена!');
            closeSummaryModal();
            renderSummaries();
        }

        function updateStorage(summary) {
            summary.incomeMaterials.forEach(item => {
                if (item.material && item.volume && item.piket) {
                    const key = `${item.material}|${item.piket}`;
                    if (!storage[key]) storage[key] = { material: item.material, piket: item.piket, volume: 0, unit: item.unit };
                    storage[key].volume += parseFloat(item.volume) || 0;
                    
                    storageHistory.unshift({
                        date: summary.date, material: item.material, type: 'приход', volume: item.volume,
                        unit: item.unit, piket: item.piket, master: summary.master, shift: summary.shift, timestamp: Date.now()
                    });
                }
            });

            summary.outcomeMaterials.forEach(item => {
                if (item.material && item.volume && item.piket) {
                    const key = `${item.material}|${item.piket}`;
                    if (storage[key]) {
                        storage[key].volume -= parseFloat(item.volume) || 0;
                        storageHistory.unshift({
                            date: summary.date, material: item.material, type: 'расход', volume: item.volume,
                            unit: item.unit, piket: item.piket, destination: item.destination,
                            master: summary.master, shift: summary.shift, timestamp: Date.now()
                        });
                    }
                }
            });

            localStorage.setItem('storage', JSON.stringify(storage));
            localStorage.setItem('storageHistory', JSON.stringify(storageHistory));
        }

        function renderSummaries() {
            const masters = [...new Set(summaries.map(s => s.master))];
            const filterSelect = document.getElementById('summaryMasterFilter');
            filterSelect.innerHTML = '<option value="all">Все мастера</option>';
            masters.forEach(m => filterSelect.innerHTML += `<option value="${m}">${m}</option>`);
            filterSummaries();
        }

        function filterSummaries() {
            const master = document.getElementById('summaryMasterFilter').value;
            const section = document.getElementById('summarySectionFilter').value;
            const shift = document.getElementById('summaryShiftFilter').value;

            let filtered = summaries;
            if (master !== 'all') filtered = filtered.filter(s => s.master === master);
            if (section !== 'all') filtered = filtered.filter(s => s.section === section);
            if (shift !== 'all') filtered = filtered.filter(s => s.shift === shift);

            const grid = document.getElementById('summariesGrid');
            grid.innerHTML = filtered.length === 0 ? '<div class="empty-state">📭 Нет сводок</div>' : '';
            
            filtered.forEach(s => {
                const card = document.createElement('div');
                card.className = 'summary-card';
                card.onclick = () => alert(JSON.stringify(s, null, 2));
                card.innerHTML = `
                    <div class="summary-header"><span class="summary-date">${s.date}</span><span class="summary-shift">${s.shift}</span></div>
                    <div class="summary-master">${s.master}</div>
                    <div class="summary-stats"><span>👥 ${s.totalPeople} чел</span><span>🚜 ${s.totalEquipment} тех</span><span>⏱️ ${s.totalHours} ч</span></div>
                `;
                grid.appendChild(card);
            });
        }

        function renderStorage() {
            const materials = [...new Set(Object.values(storage).map(s => s.material))];
            const materialFilter = document.getElementById('storageMaterialFilter');
            materialFilter.innerHTML = '<option value="all">Все материалы</option>';
            materials.forEach(m => materialFilter.innerHTML += `<option value="${m}">${m}</option>`);
            filterStorage();
        }

        function filterStorage() {
            const material = document.getElementById('storageMaterialFilter').value;
            const piket = document.getElementById('storagePiketFilter').value.toLowerCase();

            let items = Object.values(storage);
            if (material !== 'all') items = items.filter(i => i.material === material);
            if (piket) items = items.filter(i => i.piket.toLowerCase().includes(piket));

            const grid = document.getElementById('storageGrid');
            grid.innerHTML = items.length === 0 ? '<div class="empty-state">📭 Нет материалов</div>' : '';
            
            items.forEach(item => {
                const card = document.createElement('div');
                card.className = 'storage-card';
                card.innerHTML = `<div class="storage-header"><span class="storage-material">${item.material}</span><span class="storage-piket">ПК ${item.piket}</span></div><div class="storage-volume">${item.volume.toFixed(1)} ${item.unit}</div>`;
                grid.appendChild(card);
            });

            const historyBody = document.getElementById('storageHistoryBody');
            historyBody.innerHTML = '';
            storageHistory.slice(0, 20).forEach(item => {
                const row = historyBody.insertRow();
                row.innerHTML = `<td>${item.date}</td><td>${item.material}</td><td style="color: ${item.type === 'приход' ? 'var(--success)' : 'var(--danger)'}">${item.type}</td><td>${item.volume} ${item.unit}</td><td>ПК ${item.piket}</td><td>${item.master}</td><td>${item.shift}</td>`;
            });
        }

        function renderEmployees() {
            filterEmployees();
        }

        function filterEmployees() {
            const position = document.getElementById('employeePositionFilter').value;
            const section = document.getElementById('employeeSectionFilter').value;

            let filtered = employees;
            if (position !== 'all') filtered = filtered.filter(e => e.position === position);
            if (section !== 'all') filtered = filtered.filter(e => e.section === section);

            const grid = document.getElementById('employeesGrid');
            grid.innerHTML = filtered.length === 0 ? '<div class="empty-state">👥 Нет сотрудников</div>' : '';
            
            filtered.forEach(e => {
                const card = document.createElement('div');
                card.className = 'employee-card';
                card.innerHTML = `<div class="employee-name">${e.fullName}</div><div class="employee-position">${e.position}</div><div class="employee-contacts"><p>📞 ${e.phone}</p><p>📧 ${e.email}</p><p>🏗️ Участок ${e.section}</p></div>`;
                grid.appendChild(card);
            });
        }

        function showAddEmployee() {
            const name = prompt('Введите ФИО сотрудника:');
            if (!name) return;
            const position = prompt('Введите должность:');
            if (!position) return;
            const section = prompt('Введите номер участка (29/51):');
            if (!section || !['29', '51'].includes(section)) return;
            const phone = prompt('Введите телефон:');
            if (!phone) return;
            const email = prompt('Введите email:');
            if (!email) return;

            employees.push({ id: Date.now(), fullName: name, position, section, phone, email, addedAt: new Date().toISOString() });
            renderEmployees();
        }

        function renderReports() {
            document.getElementById('totalSummaries').textContent = summaries.length;
            
            const totalWorkVolume = summaries.reduce((sum, s) => sum + s.workRows.reduce((sSum, r) => sSum + (parseFloat(r.workVolume) || 0), 0), 0);
            document.getElementById('totalWorkVolume').textContent = totalWorkVolume.toFixed(1);
            
            const totalStorageValue = Object.values(storage).reduce((sum, s) => sum + s.volume, 0);
            document.getElementById('totalStorageValue').textContent = totalStorageValue.toFixed(1);
            
            document.getElementById('totalEmployees').textContent = employees.length;

            const mastersStats = {};
            summaries.forEach(s => {
                if (!mastersStats[s.master]) mastersStats[s.master] = { count: 0, volume: 0, hours: 0 };
                mastersStats[s.master].count++;
                mastersStats[s.master].volume += s.workRows.reduce((sum, r) => sum + (parseFloat(r.workVolume) || 0), 0);
                mastersStats[s.master].hours += parseFloat(s.totalHours) || 0;
            });

            const mastersBody = document.getElementById('mastersStatsBody');
            mastersBody.innerHTML = '';
            Object.entries(mastersStats).forEach(([master, stats]) => {
                mastersBody.innerHTML += `<tr><td>${master}</td><td>${stats.count}</td><td>${stats.volume.toFixed(1)}</td><td>${stats.hours.toFixed(1)}</td></tr>`;
            });

            const materialsBody = document.getElementById('materialsStatsBody');
            materialsBody.innerHTML = '';
            Object.values(storage).forEach(item => {
                materialsBody.innerHTML += `<tr><td>${item.material}</td><td>ПК ${item.piket}</td><td>${item.volume.toFixed(1)} ${item.unit}</td></tr>`;
            });
        }
    </script>
</body>
</html>
